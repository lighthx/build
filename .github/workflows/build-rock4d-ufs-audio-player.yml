name: Build ROCK 4D UFS Audio Player

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-rock4d-ufs-audio-player.yml
      - userpatches/**
      - config/boards/radxa-rock-4d.conf
      - extensions/ufs.sh

concurrency:
  group: rock4d-ufs-audio-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build Ubuntu Minimal UFS Image
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        shell: bash
        run: |
          set -eux
          df -h
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          if [[ -n "${AGENT_TOOLSDIRECTORY:-}" ]]; then
            sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          fi
          docker system prune -af || true
          df -h

      - name: Show Docker info
        shell: bash
        run: |
          docker version
          docker info

      - name: Build image
        shell: bash
        env:
          DOCKER_ARMBIAN_BASE_IMAGE: debian:trixie
        run: |
          set -eux
          ./compile.sh rock4d-ufs-audio-player build

      - name: Collect artifacts
        if: always()
        shell: bash
        run: |
          set -eux
          mkdir -p artifact/images artifact/logs

          if [[ -d output/images ]]; then
            find output/images -maxdepth 1 -type f \
              \( -name '*radxa-rock-4d*ufs*' -o -name '*Radxa-rock-4d*ufs*' \) \
              -exec cp -v {} artifact/images/ \; || true
          fi

          if [[ -d output/logs ]]; then
            cp -a output/logs/. artifact/logs/
          fi

          {
            echo '### Produced images'
            if compgen -G 'artifact/images/*' > /dev/null; then
              printf -- '- %s\n' artifact/images/*
            else
              echo '- no UFS images found'
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload images
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rock4d-ufs-audio-player-images
          path: artifact/images
          if-no-files-found: warn
          retention-days: 14

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rock4d-ufs-audio-player-logs
          path: artifact/logs
          if-no-files-found: warn
          retention-days: 14
